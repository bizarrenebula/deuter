<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Der Code des Lebens — Deutung</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #141829; --ink: #ece7db; --dim: #8a90a8; --dimmer: #6d7390;
    --gold: #d4af5f; --err: #e08f7a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; color: var(--ink);
    background: radial-gradient(ellipse at 50% -10%, #232a4d 0%, #141829 55%, #0e1120 100%);
    font-family: 'Source Sans 3', sans-serif;
    display: flex; flex-direction: column; align-items: center;
    padding: 32px 16px 24px;
  }
  header { text-align: center; max-width: 560px; }
  .langRow { display: flex; justify-content: center; gap: 18px; margin-bottom: 18px; }
  .langBtn {
    background: none; border: none; cursor: pointer; padding: 4px 2px;
    font-family: inherit; font-size: 13px; letter-spacing: .12em; text-transform: uppercase;
    color: var(--dim); border-bottom: 1px solid transparent;
  }
  .langBtn.active { color: var(--gold); border-bottom-color: var(--gold); }
  h1 {
    font-family: 'Cormorant Garamond', serif; font-weight: 500;
    font-size: clamp(34px, 6vw, 46px); margin: 0; letter-spacing: .02em;
  }
  .subtitle { margin: 6px 0 0; color: var(--dim); font-size: 15px; font-weight: 300; letter-spacing: .06em; }
  .ringWrap { margin: 30px 0 6px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .ring { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; }
  .ringCircle { position: absolute; inset: 24px; border-radius: 50%; border: 1px solid rgba(138,144,168,.25); }
  .lpDot {
    position: absolute; width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 600;
    color: var(--dim); background: rgba(236,231,219,.04);
    border: 1px solid rgba(138,144,168,.35);
    transition: all .6s ease; user-select: none;
  }
  .lpDot.on {
    color: var(--bg); background: var(--gold); border-color: var(--gold);
    box-shadow: 0 0 14px rgba(212,175,95,.55);
  }
  .ringCenter { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-style: italic; color: rgba(212,175,95,.55); }
  .lpLegend { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; max-width: 480px; }
  .lpTag {
    font-size: 12px; color: var(--gold); border: 1px solid rgba(212,175,95,.4);
    border-radius: 999px; padding: 3px 10px; letter-spacing: .04em;
  }
  main { width: 100%; max-width: 560px; display: flex; flex-direction: column; gap: 14px; margin-top: 10px; }
  textarea {
    width: 100%; background: rgba(236,231,219,.045); border: 1px solid rgba(138,144,168,.35);
    border-radius: 10px; color: var(--ink); font-family: inherit; font-size: 16px;
    line-height: 1.55; padding: 14px 16px; resize: vertical;
  }
  textarea::placeholder { color: var(--dimmer); }
  .goBtn {
    align-self: center; background: var(--gold); color: var(--bg); border: none;
    border-radius: 999px; padding: 11px 38px; font-size: 15px; font-weight: 600;
    letter-spacing: .08em; text-transform: uppercase; cursor: pointer;
    font-family: inherit; transition: background .2s ease;
  }
  .goBtn:hover:not(:disabled) { background: #e0bf75; }
  .goBtn:disabled { opacity: .6; cursor: wait; }
  .error { color: var(--err); text-align: center; font-size: 14px; margin: 0; }
  .card {
    background: rgba(236,231,219,.05); border: 1px solid rgba(212,175,95,.25);
    border-radius: 12px; padding: 26px 26px 18px; margin-top: 6px;
  }
  .card p { font-family: 'Cormorant Garamond', serif; font-size: 19px; line-height: 1.65; margin: 0 0 14px; }
  .sig { font-style: italic; color: var(--dim); font-size: 15px !important; text-align: right; margin: 6px 0 0 !important; }
  footer { margin-top: auto; padding-top: 30px; color: var(--dimmer); font-size: 12px; text-align: center; max-width: 520px; line-height: 1.5; }
  .langBtn:focus-visible, .goBtn:focus-visible, textarea:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  @media (prefers-reduced-motion: reduce) { .lpDot { transition: none; } }
  .hidden { display: none; }
</style>
</head>
<body>
<header>
  <div class="langRow">
    <button class="langBtn active" data-lang="de">Deutsch</button>
    <button class="langBtn" data-lang="bg">Български</button>
  </div>
  <h1 id="title">Der Code des Lebens</h1>
  <p class="subtitle" id="subtitle">Deutung nach den 12 Lebensprinzipien</p>
</header>

<main>
  <textarea id="input" rows="4"></textarea>
  <button class="goBtn" id="go">Deuten</button>
  <p class="error hidden" id="error"></p>
  <article class="card hidden" id="card"></article>
</main>

<footer id="footer"></footer>

<script>
// ⚙️ Nach dem Worker-Deploy hier die URL eintragen:
const WORKER_URL = "https://lebensprinzipien-deuter.bizarrenebula.workers.dev";

const UI = {
  de: {
    title: "Der Code des Lebens",
    subtitle: "Deutung nach den 12 Lebensprinzipien",
    placeholder: "Beschreiben Sie, was passiert ist — und wem. Zum Beispiel: „Mein Kollege hat Probleme mit dem Nervensystem.“",
    button: "Deuten", thinking: "Der Interpret betrachtet das Gleichnis …",
    error: "Die Deutung konnte nicht erstellt werden. Bitte versuchen Sie es erneut.",
    empty: "Bitte beschreiben Sie zuerst ein Ereignis.",
    footer: "Symbolische Selbstreflexion nach dem System von Dobrin M. Antonov — kein medizinischer, rechtlicher oder finanzieller Rat.",
    sig: "— nach dem System von Dobrin M. Antonov",
  },
  bg: {
    title: "Кодът на живота",
    subtitle: "Тълкуване по 12-те жизнени принципа",
    placeholder: "Опишете какво се е случило — и на кого. Например: „Колегата ми има проблеми с нервната система.“",
    button: "Тълкувай", thinking: "Тълкувателят разглежда знака …",
    error: "Тълкуването не можа да бъде създадено. Моля, опитайте отново.",
    empty: "Моля, първо опишете събитие.",
    footer: "Символична саморефлексия по системата на Добрин М. Антонов — не е медицински, правен или финансов съвет.",
    sig: "— по системата на Добрин М. Антонов",
  },
};
const LP_NAMES = {
  de: ["Durchsetzung","Genuss & Finanzen","Kommunikation","Familie & Wohlleben","Selbstverwirklichung","Arbeit & Alltag","Liebe & Partnerschaft","Beziehung & Pläne","Sinn & Erfolg","Ziel & Beruf","Freiheit & Freunde","Träume"],
  bg: ["Себеутвърждаване","Наслада и финанси","Комуникация","Семейство и благополучие","Себереализация","Работа и ежедневие","Любов и партньорство","Връзки и планове","Смисъл и успех","Цел и професия","Свобода и приятели","Мечти"],
};

let lang = "de";
const $ = (id) => document.getElementById(id);

// Ring aufbauen
const R = 118, ring = $("ring"), dots = [];
for (let i = 0; i < 12; i++) {
  const a = (i / 12) * 2 * Math.PI - Math.PI / 2;
  const d = document.createElement("div");
  d.className = "lpDot";
  d.textContent = i + 1;
  d.style.transform = `translate(${Math.cos(a) * R}px, ${Math.sin(a) * R}px)`;
  ring.appendChild(d);
  dots.push(d);
}

function applyLang() {
  const t = UI[lang];
  $("title").textContent = t.title;
  $("subtitle").textContent = t.subtitle;
  $("input").placeholder = t.placeholder;
  $("go").textContent = t.button;
  $("footer").textContent = t.footer;
  dots.forEach((d, i) => (d.title = `${i + 1}. LP — ${LP_NAMES[lang][i]}`));
  document.querySelectorAll(".langBtn").forEach((b) =>
    b.classList.toggle("active", b.dataset.lang === lang)
  );
}
document.querySelectorAll(".langBtn").forEach((b) =>
  b.addEventListener("click", () => { lang = b.dataset.lang; applyLang(); })
);
applyLang();

$("go").addEventListener("click", async () => {
  const t = UI[lang];
  const situation = $("input").value.trim();
  const err = $("error"), card = $("card"), go = $("go"), legend = $("legend");
  err.classList.add("hidden"); card.classList.add("hidden");
  legend.innerHTML = ""; dots.forEach((d) => d.classList.remove("on"));

  if (!situation) { err.textContent = t.empty; err.classList.remove("hidden"); return; }

  go.disabled = true; go.textContent = t.thinking; $("ringCenter").textContent = "…";
  try {
    const r = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ situation, lang }),
    });
    const data = await r.json();
    if (!r.ok || data.error) throw new Error(data.error || r.status);

    (data.principles || []).forEach((n) => {
      if (n >= 1 && n <= 12) {
        dots[n - 1].classList.add("on");
        const tag = document.createElement("span");
        tag.className = "lpTag";
        tag.textContent = `${n}. ${LP_NAMES[lang][n - 1]}`;
        legend.appendChild(tag);
      }
    });

    card.innerHTML = "";
    String(data.interpretation)
    .replace(/\\n/g, "\n")
    .split(/\n{2,}/)
    .map((p) => p.trim())
    .filter(Boolean)
    .forEach((p) => {
      const el = document.createElement("p");
      p.split("\n").forEach((line, i) => {
        if (i > 0) el.appendChild(document.createElement("br"));
        el.appendChild(document.createTextNode(line));
      });
      card.appendChild(el);
    });
    const sig = document.createElement("p");
    sig.className = "sig";
    sig.textContent = UI[lang].sig;
    card.appendChild(sig);
    card.classList.remove("hidden");
  } catch (e) {
    err.textContent = t.error; err.classList.remove("hidden");
  } finally {
    go.disabled = false; go.textContent = t.button; $("ringCenter").textContent = "12";
  }
});
</script>
</body>
</html>
